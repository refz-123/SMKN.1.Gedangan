<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen - SMKN 1 Gedangan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5e6ca, #fdf0d8);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #8B4513; margin-bottom: 20px; }
        .info {
            background: #fff8e7;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            text-align: center;
        }
        
        /* KAMERA */
        .camera-area {
            margin: 15px 0;
            text-align: center;
        }
        #video {
            width: 100%;
            border-radius: 20px;
            background: #000;
            margin-bottom: 10px;
        }
        .btn-foto {
            background: #ffd700;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .preview-img {
            max-width: 80px;
            position: fixed;
            bottom: 20px;
            right: 20px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            background: white;
            display: none;
        }
        canvas { display: none; }
        
        /* GPS */
        .gps-area {
            margin: 15px 0;
        }
        .btn-lokasi {
            background: #2196F3;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .gps-info {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        /* KIRIM */
        .btn-kirim {
            background: #28a745;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-kirim:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .aturan {
            font-size: 11px;
            color: #a0621a;
            margin-top: 15px;
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid #ffd700;
        }
        .status-ok {
            color: #2e7d32;
            font-weight: bold;
        }
        .status-wait {
            color: #f57c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📸 ABSEN KERAJAAN</h1>
            
            <div class="info">
                <p>⚔️ <strong>{{ nama }}</strong> ⚔️</p>
                <p>🏫 {{ kelas }} 🏫</p>
                <p>⏰ <span id="waktu">{{ jam }}</span></p>
                <p>📅 <span id="tanggal"></span></p>
            </div>
            
            <!-- KAMERA LANGSUNG -->
            <div class="camera-area">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <button class="btn-foto" onclick="ambilFoto()">📸 AMBIL FOTO</button>
            </div>
            <img id="preview" class="preview-img">
            
            <!-- GPS -->
            <div class="gps-area">
                <button class="btn-lokasi" onclick="ambilLokasi()">📍 AMBIL LOKASI SEKARANG</button>
                <div class="gps-info" id="gpsInfo">⚠️ Belum ambil lokasi</div>
            </div>
            
            <button class="btn-kirim" id="btnKirim" onclick="kirimAbsen()" disabled>📜 KIRIM ABSEN</button>
            
            <div class="aturan">
                ⚔️ ATURAN ⚔️<br>
                • Foto selfie WAJIB<br>
                • GPS WAJIB di SMKN 1 Gedangan Malang<br>
                • Jam 07:00-08:00 → HADIR<br>
                • Jam 08:00-10:00 → TERLAMBAT<br>
                • Lewat Jam 10:00 → ALPA
            </div>
        </div>
    </div>
    
    <script>
        let fotoBase64 = null;
        let latitude = null;
        let longitude = null;
        let stream = null;
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const preview = document.getElementById('preview');
        const btnKirim = document.getElementById('btnKirim');
        
        document.getElementById('tanggal').innerText = new Date().toISOString().split('T')[0];
        
        setInterval(() => {
            let d = new Date();
            document.getElementById('waktu').innerHTML = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
        }, 1000);
        
        // MULAI KAMERA OTOMATIS
        async function mulaiKamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch(err) {
                alert("Gagal buka kamera: " + err.message);
            }
        }
        
        // AMBIL FOTO
        function ambilFoto() {
            if (!video.videoWidth || video.videoWidth === 0) {
                alert("Kamera belum siap, tunggu sebentar");
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            fotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = fotoBase64;
            preview.style.display = 'block';
            cekSiap();
        }
        
        // AMBIL LOKASI
        function ambilLokasi() {
            const gpsDiv = document.getElementById('gpsInfo');
            gpsDiv.innerHTML = "🌍 Mendapatkan lokasi GPS...";
            gpsDiv.style.background = "#fff3e0";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        latitude = pos.coords.latitude;
                        longitude = pos.coords.longitude;
                        gpsDiv.innerHTML = `✅ Lokasi ditemukan!<br>Lat: ${latitude.toFixed(6)}, Lon: ${longitude.toFixed(6)}`;
                        gpsDiv.style.background = "#e8f5e9";
                        gpsDiv.style.color = "#2e7d32";
                        cekSiap();
                    },
                    (err) => {
                        let errorMsg = "❌ Gagal dapat lokasi! ";
                        if (err.code === 1) errorMsg += "Izinkan akses lokasi di pengaturan HP.";
                        else if (err.code === 2) errorMsg += "GPS tidak tersedia.";
                        else errorMsg += "Pastikan GPS menyala.";
                        gpsDiv.innerHTML = errorMsg;
                        gpsDiv.style.background = "#ffebee";
                        gpsDiv.style.color = "#c62828";
                    }
                );
            } else {
                gpsDiv.innerHTML = "❌ Browser tidak support GPS";
            }
        }
        
        function cekSiap() {
            if (fotoBase64 && latitude) {
                btnKirim.disabled = false;
                btnKirim.style.background = "#28a745";
            }
        }
        
        async function kirimAbsen() {
            if (!fotoBase64) {
                alert("Harap ambil foto dulu!");
                return;
            }
            if (!latitude) {
                alert("Harap ambil lokasi dulu!");
                return;
            }
            
            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerText = "⚔️ MENGIRIM...";
            
            try {
                const res = await fetch('/absen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        foto: fotoBase64,
                        lat: latitude,
                        lon: longitude
                    })
                });
                const result = await res.json();
                alert(result.message);
                if (result.status === 'success') {
                    window.location.href = '/dashboard';
                } else {
                    btn.disabled = false;
                    btn.innerText = "📜 KIRIM ABSEN";
                }
            } catch(e) {
                alert("Gagal mengirim: " + e.message);
                btn.disabled = false;
                btn.innerText = "📜 KIRIM ABSEN";
            }
        }
        
        // JALANKAN KAMERA & AMBIL LOKASI OTOMATIS
        mulaiKamera();
        
        // Ambil lokasi otomatis 1 detik setelah halaman buka
        setTimeout(() => {
            ambilLokasi();
        }, 1000);
    </script>
</body>
</html>
